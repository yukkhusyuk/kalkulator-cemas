<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kalkulator Cemas — Yuk Khusyuk</title>
<style>
:root{--bg:#0c0a06;--card:#171208;--gold:#dcac53;--soft:#f5ead2;--muted:#b8aa8c;--green:#6e8c62;--orange:#d99a4e;--red:#c2663d}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#2a2110,#0c0a06 55%);color:var(--soft);min-height:100vh}.wrap{max-width:760px;margin:auto;padding:24px}.brand{letter-spacing:.22em;color:var(--gold);font-weight:800;text-align:center;margin:12px 0 26px}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(220,172,83,.22);border-radius:24px;padding:26px;box-shadow:0 24px 70px rgba(0,0,0,.28)}h1,h2{font-family:Georgia,serif;line-height:1.05;margin:0 0 14px}h1{font-size:clamp(38px,8vw,64px);text-align:center}h1 span{color:var(--gold)}p{color:var(--muted);line-height:1.7}.btn{border:0;border-radius:16px;padding:15px 22px;background:linear-gradient(180deg,#ebcb89,#c9962e);color:#171208;font-weight:900;font-size:16px;cursor:pointer;box-shadow:0 10px 26px rgba(201,150,46,.25)}.btn.ghost{background:transparent;color:var(--gold);border:1px solid rgba(220,172,83,.35);box-shadow:none}.center{text-align:center}.screen{display:none}.screen.on{display:block}.progress{height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin:18px 0}.progress i{display:block;height:100%;background:var(--gold);width:0}.qdim{letter-spacing:.18em;color:var(--gold);font-weight:800;font-size:12px;text-transform:uppercase}.q{font-size:26px;font-family:Georgia,serif;margin:14px 0 22px;line-height:1.35}.opt{width:100%;text-align:left;margin:8px 0;padding:15px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--soft);font-size:16px;cursor:pointer}.opt:hover,.opt.sel{border-color:var(--gold);background:rgba(220,172,83,.13)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.bar{margin:12px 0}.bar .top{display:flex;justify-content:space-between;color:var(--muted);font-size:14px}.track{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}.track i{display:block;height:100%;border-radius:99px}.pill{display:inline-flex;padding:8px 16px;border-radius:99px;font-weight:900;margin:10px 0}.tips{display:grid;gap:12px}.tip{border-left:3px solid var(--gold);background:rgba(255,255,255,.04);padding:14px 16px;border-radius:14px}.foot{text-align:center;color:#887b62;font-size:12px;margin:22px 0}@media(max-width:680px){.grid{grid-template-columns:1fr}.q{font-size:22px}}
</style>
</head>
<body><div class="wrap"><div class="brand">YUK KHUSYUK</div>
<section id="intro" class="screen on"><div class="card center"><h1>Kalkulator <span>Cemas</span></h1><p>Kenali pola cemasmu lewat 15 pertanyaan singkat. Hasil ini hanya refleksi diri, bukan diagnosis klinis.</p><button class="btn" onclick="start()">Mulai Tes →</button></div></section>
<section id="quiz" class="screen"><div class="card"><div class="progress"><i id="prog"></i></div><div class="qdim" id="dim"></div><div class="q" id="qt"></div><div id="opts"></div><p id="count"></p><button class="btn ghost" onclick="back()">← Kembali</button></div></section>
<section id="result" class="screen"><div class="card center"><div class="qdim">HASIL TES KETENANGAN HATI</div><h2 id="title"></h2><div style="font-size:64px;font-weight:900;color:var(--gold)" id="score"></div><div class="pill" id="level"></div><p id="desc"></p></div><div class="grid" style="margin-top:16px"><div class="card"><h2>Peta 5 Dimensi</h2><div id="bars"></div></div><div class="card"><h2>Yang bisa kamu lakukan</h2><div class="tips" id="tips"></div></div></div><div class="center" style="margin-top:18px"><button class="btn" onclick="restart()">Ulangi Tes</button> <a class="btn ghost" href="../">Beranda</a></div></section>
<div class="foot">Yuk Khusyuk — alat refleksi, bukan pengganti psikolog/dokter.</div></div>
<script>
const dims={pikiran:['Pikiran','#dcac53'],tubuh:['Tubuh','#d99a4e'],emosi:['Emosi','#c2663d'],kontrol:['Kontrol','#b8893a'],batin:['Batin','#6e8c62']};
const qs=[['pikiran','Pikiranku sering muter dan susah dihentikan — terutama soal hal yang belum tentu terjadi.'],['tubuh','Aku merasa jantung berdebar, dada sesak, atau napas pendek tanpa sebab fisik yang jelas.'],['emosi','Aku merasa gelisah, sulit tenang, seperti selalu di ujung.'],['kontrol','Cemas membuatku sulit fokus pada pekerjaan atau aktivitas sehari-hari.'],['batin','Saat cemas, sholatku terasa buru-buru dan sulit khusyuk.'],['pikiran','Aku cenderung langsung membayangkan kemungkinan terburuk dari sebuah situasi.'],['tubuh','Ototku terasa tegang, atau gampang lelah padahal tak melakukan hal berat.'],['emosi','Aku mudah tersinggung, kaget, atau cepat panik akhir-akhir ini.'],['kontrol','Aku merasa harus mengontrol segala hal agar bisa merasa aman.'],['batin','Aku merasa jauh, hampa, atau kering secara spiritual belakangan ini.'],['pikiran','Aku sulit berhenti mengkhawatirkan banyak hal sekaligus.'],['tubuh','Aku susah tidur atau tidurku tidak nyenyak karena pikiran yang ramai.'],['emosi','Aku sering dihantui rasa takut tanpa tahu pasti penyebabnya.'],['kontrol','Aku menghindari situasi tertentu karena takut merasa cemas di sana.'],['batin','Saat berat, aku sulit merasa ada tempat untuk bersandar dan berserah.']];
const scale=['Tidak pernah','Beberapa hari','Lebih dari separuh hari','Hampir setiap hari'];let i=0,ans=Array(qs.length).fill(null);function show(x){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(x).classList.add('on');scrollTo(0,0)}function start(){i=0;render();show('quiz')}function render(){let q=qs[i];document.getElementById('prog').style.width=(i/qs.length*100)+'%';document.getElementById('dim').textContent=dims[q[0]][0];document.getElementById('qt').textContent=q[1];document.getElementById('count').textContent=(i+1)+' dari '+qs.length;document.getElementById('opts').innerHTML=scale.map((s,n)=>`<button class="opt ${ans[i]===n?'sel':''}" onclick="choose(${n})">${s} <b style="float:right">${n}</b></button>`).join('')}function choose(v){ans[i]=v;if(i<qs.length-1){i++;render()}else calc()}function back(){if(i>0){i--;render()}else show('intro')}function calc(){let sub={pikiran:0,tubuh:0,emosi:0,kontrol:0,batin:0};qs.forEach((q,n)=>sub[q[0]]+=ans[n]||0);let total=Object.values(sub).reduce((a,b)=>a+b,0);let name,desc,color;if(total<=9){name='Tenang';desc='Cemasmu relatif rendah. Rawat dengan rutinitas baik dan sholat yang pelan.';color='#6e8c62'}else if(total<=18){name='Cemas Ringan';desc='Ada riak cemas yang mulai terasa. Jangan diabaikan, tapi jangan ditakuti.';color='#dcac53'}else if(total<=27){name='Cemas Sedang';desc='Cemas mulai cukup mengganggu. Cerita ke orang tepercaya atau profesional bisa jadi ikhtiar baik.';color='#d99a4e'}else{name='Cemas Tinggi';desc='Hatimu sedang memikul banyak. Jangan sendirian; pertimbangkan bantuan profesional.';color='#c2663d'}document.getElementById('title').textContent='Ini Potret Hatimu Sekarang';document.getElementById('score').textContent=total+'/45';let lvl=document.getElementById('level');lvl.textContent=name;lvl.style.background=color+'33';lvl.style.color=color;document.getElementById('desc').textContent=desc;document.getElementById('bars').innerHTML=Object.keys(sub).map(k=>`<div class="bar"><div class="top"><span>${dims[k][0]}</span><b>${sub[k]}/9</b></div><div class="track"><i style="width:${sub[k]/9*100}%;background:${dims[k][1]}"></i></div></div>`).join('');document.getElementById('tips').innerHTML=['Grounding 5-4-3-2-1 saat panik datang.','Tarik napas 4 detik, tahan 4, embus 4.','Beri label: ini pikiran cemas, bukan fakta.','Wudhu, sholat 2 rakaat, dan perlambat sujud.'].map(x=>`<div class="tip">${x}</div>`).join('');show('result')}function restart(){ans.fill(null);show('intro')}
</script></body></html>
